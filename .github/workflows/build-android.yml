name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'preview'
        type: choice
        options:
        - preview
        - production

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EXPO_CLI_VERSION: "~18.0.0"

jobs:
  build-android:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS Build
        run: |
          cd apps/mobile
          # Build office-game assets first (required for APK bundling)
          npm --prefix office-game install
          npm --prefix office-game run build
          npx eas-cli init --force --non-interactive
          npx eas-cli build --platform android --non-interactive --no-wait --profile preview

      - name: Wait for build to complete
        run: |
          echo "Waiting for EAS build to complete..."
          # Build ID will be output, store it
          echo "Check EAS dashboard for build status: https://expo.dev/accounts/luminox/builds"

      - name: Download build artifact
        if: always()
        run: |
          echo "Checking build status..."
          npx eas-cli build:list --platform android --limit 1
